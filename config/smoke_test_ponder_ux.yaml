target:
  url: "https://ponder.ing/dashboard"
  dashboard_url: "https://ponder.ing/dashboard"

task:
  goal: "Understand the logged-in user experience, onboarding cues, workspace entry points, and primary knowledge workflow surfaces."
  goal_keywords:
    - "workspace"
    - "knowledge"
    - "files"
    - "question"
    - "spaces"
    - "research"
    - "insights"
  allow_registration_flows: false
  allow_login_flows: true
  captcha_policy: "pause_and_report"
  human_assistance_allowed: true
  use_site_memory: true
  validate_action_outcomes: true
  reobserve_on_state_change: true
  use_vision_on_state_change: true
  max_reobservations_per_run: 10
  profile_name: "Test User"
  profile_email: "test@example.com"
  profile_password: ""
  profile_company: "Example Inc"

login:
  mode: "login"
  username: ""
  password: ""
  success_indicator: ""

budget:
  max_states: 6
  max_depth: 2
  retry_limit: 1
  novelty_threshold: 0.12

browser:
  headless: false
  viewport_width: 1440
  viewport_height: 900
  slow_mo: 100

vision:
  enabled: true
  provider: "openai"
  model: "gpt-5.4"
  api_base_url: "https://api.openai.com/v1"
  api_key_env: "OPENAI_API_KEY"
  timeout_ms: 20000

run:
  profile: "demo"
  enable_page_action_planning: true
  enable_interaction_exploration: true

layering:
  selector_preset: "general_web"
  heuristic_preset: "none"
  site_patterns_enabled: true

output:
  screenshots_dir: "output/ponder_ux_demo/screenshots"
  dom_snapshots_dir: "output/ponder_ux_demo/dom_snapshots"
  reports_dir: "output/ponder_ux_demo/reports"
  artifacts_dir: "output/ponder_ux_demo/artifacts"
