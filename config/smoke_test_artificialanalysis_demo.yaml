target:
  url: "https://artificialanalysis.ai/"
  dashboard_url: ""

task:
  goal: "Understand the site's main product surfaces, analysis workflows, and user entry points."
  goal_keywords:
    - "benchmarks"
    - "models"
    - "pricing"
    - "evaluations"
    - "methodology"
  allow_registration_flows: false
  allow_login_flows: false
  captcha_policy: "pause_and_report"
  human_assistance_allowed: true
  use_site_memory: true
  validate_action_outcomes: true
  reobserve_on_state_change: true
  use_vision_on_state_change: true
  max_reobservations_per_run: 10
  profile_name: "Test User"
  profile_email: "test@example.com"
  profile_password: "TestPassword123!"
  profile_company: "Example Inc"

login:
  mode: "public"
  username: ""
  password: ""

budget:
  max_states: 8
  max_depth: 2
  retry_limit: 1
  novelty_threshold: 0.12

browser:
  headless: false
  viewport_width: 1440
  viewport_height: 900
  slow_mo: 100

vision:
  enabled: true
  provider: "openai"
  model: "gpt-5.4"
  api_base_url: "https://api.openai.com/v1"
  api_key_env: "OPENAI_API_KEY"
  timeout_ms: 20000

run:
  profile: "demo"
  enable_page_action_planning: false
  enable_interaction_exploration: false

layering:
  selector_preset: "general_web"
  heuristic_preset: "none"
  site_patterns_enabled: true
