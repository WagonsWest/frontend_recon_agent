target:
  url: "https://arena.ai/leaderboard"
  dashboard_url: ""

task:
  goal: "Understand the site's main benchmark surfaces, leaderboard workflows, and public comparison entry points."
  goal_keywords:
    - "leaderboard"
    - "models"
    - "code"
    - "vision"
    - "image"
    - "arena"
    - "benchmark"
  allow_registration_flows: false
  allow_login_flows: false
  captcha_policy: "pause_and_report"
  human_assistance_allowed: true
  use_site_memory: true
  validate_action_outcomes: true
  reobserve_on_state_change: true
  use_vision_on_state_change: true
  max_reobservations_per_run: 10
  profile_name: "Test User"
  profile_email: "test@example.com"
  profile_password: "TestPassword123!"
  profile_company: "Example Inc"

login:
  mode: "public"
  username: ""
  password: ""

budget:
  max_states: 10
  max_depth: 2
  retry_limit: 1
  novelty_threshold: 0.12

browser:
  headless: false
  viewport_width: 1440
  viewport_height: 900
  slow_mo: 100

vision:
  enabled: true
  provider: "openai"
  model: "gpt-5.4"
  api_base_url: "https://api.openai.com/v1"
  api_key_env: "OPENAI_API_KEY"
  timeout_ms: 20000

synthesis:
  enabled: false
  provider: "openai"
  model: "gpt-5.4"
  api_base_url: "https://api.openai.com/v1"
  api_key_env: "OPENAI_API_KEY"
  timeout_ms: 25000

run:
  profile: "demo"
  enable_page_action_planning: false
  enable_interaction_exploration: false

layering:
  selector_preset: "general_web"
  heuristic_preset: "competitive_analysis"
  site_patterns_enabled: true

output:
  screenshots_dir: "output/lmarena_demo/screenshots"
  dom_snapshots_dir: "output/lmarena_demo/dom_snapshots"
  reports_dir: "output/lmarena_demo/reports"
  artifacts_dir: "output/lmarena_demo/artifacts"
