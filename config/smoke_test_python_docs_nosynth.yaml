target:
  url: "https://docs.python.org/3/"
  dashboard_url: ""

task:
  goal: "Understand the documentation site's main sections and entry points."
  goal_keywords:
    - "tutorial"
    - "library reference"
    - "getting started"
    - "download"
  allow_registration_flows: false
  allow_login_flows: false
  captcha_policy: "pause_and_report"
  human_assistance_allowed: true
  use_site_memory: true
  validate_action_outcomes: true
  reobserve_on_state_change: true
  use_vision_on_state_change: true
  max_reobservations_per_run: 12
  profile_name: "Test User"
  profile_email: "test@example.com"
  profile_password: "TestPassword123!"
  profile_company: "Example Inc"

login:
  mode: "public"
  username: ""
  password: ""

budget:
  max_states: 6
  max_depth: 2
  retry_limit: 1
  novelty_threshold: 0.12

browser:
  headless: true
  viewport_width: 1440
  viewport_height: 900
  slow_mo: 50

vision:
  enabled: true
  provider: "openai"
  model: "gpt-5.4"
  api_base_url: "https://api.openai.com/v1"
  api_key_env: "OPENAI_API_KEY"
  timeout_ms: 20000

synthesis:
  enabled: false
  provider: "openai"
  model: "gpt-5.4"
  api_base_url: "https://api.openai.com/v1"
  api_key_env: "OPENAI_API_KEY"
  timeout_ms: 25000
