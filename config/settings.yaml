# Frontend Mimic Agent Configuration
# Copy this to settings.local.yaml and fill in your values

target:
  url: "https://example.com/login"       # Target website login URL
  dashboard_url: ""                       # URL after login (leave empty to auto-detect)

task:
  goal: "Explore the target website and understand its product surfaces."
  goal_keywords: []
  allow_registration_flows: true
  allow_login_flows: true
  captcha_policy: "pause_and_report"      # pause_and_report | retry | ignore
  human_assistance_allowed: true
  use_site_memory: true
  validate_action_outcomes: true
  reobserve_on_state_change: true
  use_vision_on_state_change: true
  max_reobservations_per_run: 30
  profile_name: "Test User"
  profile_email: "test@example.com"
  profile_password: "TestPassword123!"
  profile_company: "Example Inc"

login:
  mode: "auto"                           # auto | public | login | register
  username: ""                            # Your account username
  password: ""                            # Your account password
  register_url: ""                        # Optional explicit registration URL
  register_link_selector: ""              # Optional selector that opens the registration form
  username_selector: "input[type='text'], input[name='username'], input[name='email']"
  password_selector: "input[type='password']"
  submit_selector: "button[type='submit'], button:has-text('Login'), button:has-text('Sign in'), button:has-text('登录'), button:has-text('Log in')"
  success_indicator: ""                   # Optional: selector visible only after login
  registration_name_selector: "input[name='name'], input[name='full_name'], input[name='fullname'], input[autocomplete='name']"
  registration_email_selector: "input[type='email'], input[name='email']"
  registration_password_selector: "input[type='password'], input[name='password'], input[autocomplete='new-password']"
  registration_confirm_password_selector: "input[name='confirm_password'], input[name='password_confirmation'], input[name='confirmPassword']"
  registration_company_selector: "input[name='company'], input[name='organization'], input[name='org'], input[name='workspace']"
  registration_submit_selector: "button[type='submit'], button:has-text('Sign up'), button:has-text('Get started'), button:has-text('Create account'), button:has-text('Register')"
  registration_success_indicator: ""      # Optional: selector visible only after registration succeeds
  verification_code_selector: "input[autocomplete='one-time-code'], input[name*='code'], input[id*='code'], input[name*='otp'], input[id*='otp'], input[inputmode='numeric']"
  verification_submit_selector: "button[type='submit'], button:has-text('Verify'), button:has-text('Continue'), button:has-text('Confirm'), button:has-text('Activate')"

crawl:
  wait_after_navigation: 1500             # ms to wait after each navigation
  wait_for_spa: 1500                      # ms extra wait for SPA rendering
  interaction_timeout: 3000               # ms timeout for interaction clicks
  max_interaction_items: 5                # Max dropdown items to click per action button
  exclude_patterns:
    - "/logout"
    - "/api/"
    - ".pdf"
    - ".zip"

budget:
  max_states: 100                         # Total states to capture before stopping
  max_depth: 5                            # Maximum exploration depth from root
  retry_limit: 2                          # Max retries per failed target
  novelty_threshold: 0.12                 # Below this, skip capture entirely (0.0-1.0)

exploration:
  skip_patterns:                          # URL/label patterns to skip
    - "/logout"
    - "/api/"
    - ".pdf"
    - ".zip"
    - "javascript:"
    - "mailto:"
  destructive_keywords:                   # Button text to never click
    - "删除"
    - "delete"
    - "remove"
    - "drop"
    - "destroy"
    - "清空"
    - "reset"
  nav_selectors:                          # CSS selectors for navigation menu items (leaf items only)
    - "a:has(> .el-menu-item)"
    - ".el-menu-item a[href]"
    - ".ant-menu-item > a[href]"
    - ".ant-menu-item"
    - "nav a[href]"
    - ".sidebar a[href]"
    - ".side-nav a[href]"

# Interaction selectors — customize for different UI frameworks
interaction:
  action_button_selectors:
    - "button:has-text('操作')"
    - "button:has-text('Actions')"
    - "button:has-text('Action')"
    - ".el-dropdown:has-text('操作') button"
    - ".ant-dropdown-trigger"
    - ".dropdown-toggle"
  add_button_selectors:
    - "button:has-text('添加')"
    - "button:has-text('新增')"
    - "button:has-text('Add')"
    - "button:has-text('Create')"
    - "button:has-text('New')"
  dropdown_item_selector: ".el-dropdown-menu__item:visible, .ant-dropdown-menu-item:visible, .dropdown-item:visible, [role='menuitem']:visible"
  modal_selectors:
    - ".el-dialog:visible"
    - ".el-drawer:visible"
    - ".ant-modal-wrap:visible"
    - ".modal.show"
    - "[role='dialog']:visible"
  modal_close_selectors:
    - ".el-dialog__headerbtn"
    - ".el-drawer__close-btn"
    - ".ant-modal-close"
    - ".modal .btn-close"
    - "[aria-label='Close']"
  expand_selectors:
    - ".el-table__expand-icon"
    - ".ant-table-row-expand-icon"
  tab_selector: ".el-tabs__item:not(.is-active), .ant-tabs-tab:not(.ant-tabs-tab-active), .nav-link:not(.active)"

browser:
  headless: false                         # Visible browser is required for manual auth/verification assistance
  viewport_width: 1920
  viewport_height: 1080
  slow_mo: 200

vision:
  enabled: false
  provider: "openai"
  model: "gpt-5.4"
  api_base_url: "https://api.openai.com/v1"
  api_key_env: "OPENAI_API_KEY"
  timeout_ms: 15000
  max_image_side: 1440
  artifact_dir: "vision"
  page_insights_dir: "page_insights"

synthesis:
  enabled: false
  provider: "openai"
  model: "gpt-4.1-mini"
  api_base_url: "https://api.openai.com/v1"
  api_key_env: "OPENAI_API_KEY"
  timeout_ms: 20000
  artifact_filename_json: "competitive_analysis_llm.json"
  artifact_filename_md: "competitive_analysis.md"
  structured_report_filename_md: "competitive_analysis_structured.md"
  readable_report_filename_md: "competitive_analysis_readable.md"

run:
  profile: "default"                      # default | smoke_fast | demo | full
  navigation_wait_until: "networkidle"   # networkidle | domcontentloaded
  enable_page_action_planning: true
  enable_interaction_exploration: true
  enable_extraction: true
  capture_report_screenshots: true
  enable_timing_summary: true

output:
  screenshots_dir: "output/screenshots"
  dom_snapshots_dir: "output/dom_snapshots"
  reports_dir: "output/reports"
  artifacts_dir: "output/artifacts"
