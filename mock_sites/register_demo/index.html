<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f7fb;
      color: #1d2939;
    }
    main {
      max-width: 720px;
      margin: 48px auto;
      padding: 32px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 18px 48px rgba(15, 23, 42, 0.12);
    }
    h1 {
      margin-top: 0;
    }
    form {
      display: grid;
      gap: 16px;
    }
    label {
      display: grid;
      gap: 8px;
      font-weight: 600;
    }
    input {
      padding: 12px 14px;
      border: 1px solid #d0d5dd;
      border-radius: 10px;
      font-size: 16px;
    }
    button {
      padding: 14px 18px;
      border: none;
      border-radius: 10px;
      background: #175cd3;
      color: #ffffff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main>
    <h1>Create your account</h1>
    <p>Use this local mock page to validate the registration flow.</p>
    <form action="/dashboard.html" method="get">
      <label>
        Full name
        <input name="name" autocomplete="name" />
      </label>
      <label>
        Work email
        <input type="email" name="email" />
      </label>
      <label>
        Password
        <input type="password" name="password" autocomplete="new-password" />
      </label>
      <label>
        Company
        <input name="company" />
      </label>
      <button type="submit">Sign up</button>
    </form>
  </main>
</body>
</html>
